<aside
  class="sidebar"
  [class.expanded]="isExpanded"
  [class.rtl]="isRtl"
  [class.ltr]="!isRtl"
  (mouseenter)="onmouseenter()"
  (mouseleave)="onmouseleave()"
>
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <mat-icon>dentistry</mat-icon>
    </div>
    @if (isExpanded) {
      <span class="logo-text">Dent</span>
    }
  </div>

  <!-- Main Navigation -->
  <nav class="sidebar-nav">
    @for (item of navItems; track item.route) {
      <a
        class="nav-item"
        [routerLink]="item.route"
        routerLinkActive="active"
        [pTooltip]="isExpanded ? '' : getTooltip(item)"
        tooltipPosition="right"
        [tooltipDisabled]="isExpanded"
      >
        <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
        @if (isExpanded) {
          <span class="nav-label">{{ item.labelKey | translate }}</span>
        }
      </a>
    }
  </nav>

  <!-- Bottom Navigation -->
  <div class="sidebar-bottom">
    @for (item of bottomItems; track item.route) {
      <a
        class="nav-item"
        [routerLink]="item.route"
        routerLinkActive="active"
        [pTooltip]="isExpanded ? '' : getTooltip(item)"
        tooltipPosition="right"
        [tooltipDisabled]="isExpanded"
      >
        <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
        @if (isExpanded) {
          <span class="nav-label">{{ item.labelKey | translate }}</span>
        }
      </a>
    }
  </div>
</aside>
